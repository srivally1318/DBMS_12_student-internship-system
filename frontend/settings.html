<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - SIMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <a href="dashboard.html" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            SIMS
        </a>
        <div class="nav-links">
            <a href="view_internships.html">View Internships</a>
            <a href="applications.html">My Applications</a>
            <a href="settings.html" style="color: var(--primary); font-weight: 700;">Profile Settings</a>
            <a href="#" id="logout-btn" class="btn btn-primary btn-small">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h2>Profile Settings</h2>
        </div>
        
        <div class="form-container" style="margin-top: 0; max-width: 600px; margin-left: 0;">
            <form id="settings-form">
                <div class="form-group">
                    <label for="profile-name">Full Name</label>
                    <input type="text" id="profile-name" required>
                </div>
                <div class="form-group">
                    <label for="profile-email">Email</label>
                    <input type="email" id="profile-email" required readonly style="background-color: #f1f5f9; cursor: not-allowed; color: #64748b;">
                    <small style="color: var(--text-light); display: block; margin-top: 0.5rem;">Email cannot be changed.</small>
                </div>
                <div id="settings-success" class="alert alert-success hidden"></div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = requireAuth();
            if (user) {
                document.getElementById('profile-name').value = user.name;
                document.getElementById('profile-email').value = user.email;
            }
            initSettingsForm();
        });
    </script>
</body>
</html>
